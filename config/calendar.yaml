# Finanční kalendář + zdroje dokumentů pro automatický ingest (pipeline.watch).
# Watcher pro každou banku zkontroluje, zda je zveřejnění "due" (publish_date <= dnes),
# stáhne dokument (local soubor / http URL vzor), spočítá checksum (idempotence),
# postaví staging DB, projde validací (brána) a teprve pak promotuje do produkce.
defaults:
  gate:
    require_validation: true     # rekonciliace (run_build) musí projít
    headline_metric: net_profit  # headline metrika musí existovat pro nejnovější období
    # kontrola kompletnosti: tyhle metriky MUSÍ být pro nejnovější období (jinak ruční nahrání)
    required_metrics: [net_profit, operating_result, operating_income, net_interest_income,
                       net_fee_commission_income, total_assets, net_customer_loans, customer_deposits]
    # a alespoň tolik % očekávaných metrik ze source-mapy banky (záchyt useknutého/špatného souboru)
    min_coverage: 0.8

banks:
  cs:
    ir_page: https://www.csas.cz/cs/o-nas/pro-investory
    document:
      # V produkci: kind: http + url_pattern (IR zveřejní strukturovaný xlsx).
      # Zde kind: local (offline, běží i v CI). Cestu lze přebít přes --source cs=<path>.
      kind: local
      path: key_figures_q1_2026.xlsx
      basis: reported
      # url_pattern: https://www.csas.cz/.../key_figures_q{quarter}_{year}.xlsx
    releases:
      - { period: 2026Q1, publish_date: 2026-05-06 }
      - { period: 2026Q2, publish_date: 2026-08-05 }

  kb:
    ir_page: https://www.kb.cz/en/about-bank/for-investors
    document:
      kind: local
      path: KB-Facts-and-Figures-2026-1Q.xlsx
      basis: reported
    releases:
      - { period: 2026Q1, publish_date: 2026-05-07 }

  csob:
    ir_page: https://www.csob.cz/portal/o-csob/vztahy-s-investory
    document:
      kind: local
      path: csob-fact-sheet.xlsx
      basis: reported
    releases:
      - { period: 2026Q1, publish_date: 2026-05-14 }

  moneta:
    ir_page: https://investors.moneta.cz/financial-results
    document:
      kind: local
      path: mmb-1q2026-basic-financial-data.xlsx
      basis: reported
    releases:
      - { period: 2026Q1, publish_date: 2026-04-29 }
