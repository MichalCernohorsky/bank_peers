# Katalog bank. `source` říká, JAK se banka plní:
#   kind: xlsx      strukturovaný zdroj -> ingest přes config/sources/<map>.yaml (basis=reported)
#                   path (volitelné) přepíše cestu k souboru; jinak se bere globální XLSX_PATH/CLI arg
#   kind: adjusted  jen peer/PDF data -> config/manual/peer_adjusted.csv (basis=adjusted)
# Pravidlo: reported (deep-dive) a adjusted (peer srovnání) se v jednom grafu nemíchají.
# Chybějící zdrojový soubor se při buildu přeskočí (warn), prebuilt DB nese data.
banks:
  - code: cs
    name: Česká spořitelna
    parent_group: Erste Group
    source:
      kind: xlsx
      map: cs            # config/sources/cs.yaml; cesta z XLSX_PATH/CLI argumentu

  - code: kb
    name: Komerční banka
    parent_group: Société Générale
    source:
      kind: xlsx
      map: kb
      path: KB-Facts-and-Figures-2026-1Q.xlsx

  - code: csob
    name: ČSOB
    parent_group: KBC Group
    source:
      kind: xlsx
      map: csob
      path: csob-fact-sheet.xlsx

  - code: moneta
    name: MONETA Money Bank
    parent_group: Nezávislá (PSE)
    source:
      kind: xlsx
      map: moneta
      path: mmb-1q2026-basic-financial-data.xlsx
