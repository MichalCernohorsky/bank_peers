<head>

<style>
  :root{--ink:#0B2238;--soft:#566B82;--line:#E3E9F0;--l2:#EEF2F7;--canvas:#F3F6FA;--panel:#fff;
    --navy:#0B2238;--navy2:#13314C;--brand:#C8102E;--accent:#2D6FB3;--pos:#157347;--neg:#C0392B;
    --radius:14px;--shadow:0 1px 2px rgba(11,34,56,.05),0 8px 24px -16px rgba(11,34,56,.25)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--canvas);color:var(--ink);
    line-height:1.45;font-feature-settings:'tnum' 1;-webkit-font-smoothing:antialiased}
  .mono{font-family:'IBM Plex Mono',monospace}
  .topbar{background:var(--navy);color:#E8EEF4;display:flex;align-items:center;justify-content:space-between;
    gap:16px;padding:0 24px;height:54px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;font-weight:600}
  .brand .mark{width:30px;height:30px;border-radius:7px;background:var(--brand);display:grid;place-items:center;
    font-family:'IBM Plex Serif';font-weight:600;color:#fff;font-size:15px}
  .brand small{color:#9DB2C8;font-weight:400;font-size:12.5px}
  .topmeta{display:flex;align-items:center;gap:14px;font-size:12.5px;color:#9DB2C8}
  .period{color:#E8EEF4;font-weight:600;background:rgba(255,255,255,.08);padding:5px 12px;border-radius:99px;
    border:1px solid rgba(255,255,255,.12);font-family:'IBM Plex Mono';font-size:12.5px}
  .dot{width:7px;height:7px;border-radius:99px;background:#43C08A;display:inline-block}
  .wrap{max-width:1180px;margin:0 auto;padding:26px 24px 60px}
  h1{font-family:'IBM Plex Serif';font-weight:600;font-size:27px;letter-spacing:-.3px}
  .sub{color:var(--soft);font-size:13px;margin-top:4px}.sub b{color:var(--ink)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0 16px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  .kpi .name{font-size:11.5px;color:var(--soft);font-weight:500;min-height:30px}
  .kpi .val{font-family:'IBM Plex Mono';font-weight:600;font-size:22px;letter-spacing:-.5px;margin:6px 0 4px}
  .kpi .val .u{font-size:11px;color:var(--soft)}
  .kpi .d{font-size:11px;font-family:'IBM Plex Mono'}
  .pos{color:var(--pos)}.neg{color:var(--neg)}.flat{color:var(--soft)}
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px}
  .panel h2{font-family:'IBM Plex Serif';font-size:15px;font-weight:600}
  .panel .ph{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .panel .ph p{font-size:12px;color:var(--soft)}
  .seg{display:flex;gap:3px;flex-wrap:wrap}
  .seg button{border:1px solid var(--line);background:#fff;color:var(--soft);cursor:pointer;font-family:inherit;
    font-size:11px;font-weight:500;padding:4px 8px;border-radius:6px}
  .seg button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  svg{display:block;overflow:visible}
  .axis{font-family:'IBM Plex Mono';font-size:9.5px;fill:var(--soft)}
  .vlabel{font-family:'IBM Plex Mono';font-size:9.5px;fill:var(--ink);font-weight:500}
  /* category tables */
  .cats{margin-top:20px}
  .cat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:6px 0 2px;margin-bottom:14px;overflow:hidden}
  .cat h3{font-family:'IBM Plex Serif';font-size:15px;font-weight:600;padding:12px 20px 8px;display:flex;
    align-items:center;gap:10px}
  .cat h3 span{font-family:'IBM Plex Sans';font-size:11px;color:var(--soft);font-weight:400}
  table{width:100%;border-collapse:collapse}
  thead th{font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--soft);font-weight:600;
    text-align:right;padding:6px 20px;border-bottom:1px solid var(--line)}
  thead th:first-child{text-align:left}
  tbody td{padding:9px 20px;border-bottom:1px solid var(--l2);font-size:13px;text-align:right;vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tbody td:first-child{text-align:left;font-weight:500}
  tbody tr.hl td:first-child{font-weight:600}
  tbody tr.hl td:first-child::before{content:'';display:inline-block;width:6px;height:6px;border-radius:99px;
    background:var(--brand);margin-right:8px;vertical-align:1px}
  td.num{font-family:'IBM Plex Mono';font-weight:500}
  td .u{color:var(--soft);font-size:10px}
  .spk{width:90px}
  tbody tr:hover{background:#FAFBFD}
  .foot{margin-top:22px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--soft);
    display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .pill{background:#EAF0F6;border:1px solid var(--line);border-radius:99px;padding:5px 12px;color:var(--navy2);font-weight:500}
  @media(max-width:920px){.grid{grid-template-columns:repeat(2,1fr)}.panels{grid-template-columns:1fr}.spk{display:none}}
  @media(max-width:520px){.grid{grid-template-columns:1fr}.topmeta{display:none}}
</style>
</head>

const cz=(n,d=1)=>n.toLocaleString('cs-CZ',{minimumFractionDigits:d,maximumFractionDigits:d});
function fmt(unit,type,v){
  if(v==null) return '—';
  if(unit==='percent'||unit==='ratio') return cz(v*100,1)+'<span class="u"> %</span>';
  if(unit==='CZK_m') return cz(v/1000, Math.abs(v/1000)>=100?0:1)+'<span class="u"> mld</span>';
  if(unit==='count') return v>=1e6? cz(v/1e6,1)+'<span class="u"> mil.</span>' : Math.round(v).toLocaleString('cs-CZ');
  return cz(v,1);
}
function yoyHtml(unit,type,yoy){
  if(yoy==null) return '<span class="flat">—</span>';
  const ratio=(type==='ratio'); const up=yoy>=0;
  const cls=up?'pos':'neg', arr=up?'▲':'▼';
  const txt=ratio?(up?'+':'')+yoy.toFixed(1)+' pp':(up?'+':'')+yoy.toFixed(1)+' %';
  return `<span class="${cls}">${arr} ${txt}</span>`;
}
function spark(ser,unit){
  if(!ser||ser.length<2) return '';
  const vs=ser.map(p=>unit==='CZK_m'?p.v/1000:(unit==='percent'||unit==='ratio'?p.v*100:p.v));
  const W=90,H=24,mn=Math.min(...vs),mx=Math.max(...vs),sp=(mx-mn)||1;
  const X=i=>2+i*(W-4)/(vs.length-1), Y=v=>2+(H-4)*(1-(v-mn)/sp);
  const d=vs.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
  const last=vs[vs.length-1], up=vs[vs.length-1]>=vs[0];
  return `<svg class="spk" viewBox="0 0 ${W} ${H}" height="24"><path d="${d}" fill="none" stroke="${up?'#157347':'#C0392B'}" stroke-width="1.4"/>`+
         `<circle cx="${X(vs.length-1).toFixed(1)}" cy="${Y(last).toFixed(1)}" r="2" fill="${up?'#157347':'#C0392B'}"/></svg>`;
}
// charts
function barChart(el,rows,color){
  const W=520,H=220,pad={l:8,r:8,t:14,b:24};const vals=rows.map(r=>r.v/1000);
  const max=Math.max(...vals,0.1),min=Math.min(...vals,0),span=(max-min)||1,iw=W-pad.l-pad.r,ih=H-pad.t-pad.b;
  const gap=iw/rows.length,bw=gap*0.62,y0=pad.t+ih*(max/span);let s=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  s+=`<line x1="${pad.l}" y1="${y0.toFixed(1)}" x2="${W-pad.r}" y2="${y0.toFixed(1)}" stroke="#E3E9F0"/>`;
  rows.forEach((r,i)=>{const v=r.v/1000,x=pad.l+gap*i+(gap-bw)/2,h=Math.abs(v)/span*ih,y=v>=0?y0-h:y0;
    s+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(h,1).toFixed(1)}" rx="3" fill="${color}"/>`;
    s+=`<text class="vlabel" x="${(x+bw/2).toFixed(1)}" y="${(v>=0?y-4:y+h+11).toFixed(1)}" text-anchor="middle">${cz(v,1)}</text>`;
    s+=`<text class="axis" x="${(x+bw/2).toFixed(1)}" y="${H-8}" text-anchor="middle">${r.y}Q${r.q}</text>`;});
  el.innerHTML=s+'</svg>';
}
function lineChart(el,rows){
  const W=520,H=220,pad={l:8,r:8,t:16,b:24};const vals=rows.map(r=>r.v/1000),max=Math.max(...vals),min=Math.min(...vals)*0.9;
  const iw=W-pad.l-pad.r,ih=H-pad.t-pad.b,span=(max-min)||1,X=i=>pad.l+iw*i/(rows.length-1),Y=v=>pad.t+ih*(1-(v/1000-min)/span);
  const pts=rows.map((r,i)=>[X(i),Y(r.v)]);const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=path+` L ${pts.at(-1)[0].toFixed(1)} ${pad.t+ih} L ${pts[0][0].toFixed(1)} ${pad.t+ih} Z`;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2D6FB3" stop-opacity=".22"/><stop offset="1" stop-color="#2D6FB3" stop-opacity="0"/></linearGradient></defs>`;
  s+=`<path d="${area}" fill="url(#g)"/><path d="${path}" fill="none" stroke="#2D6FB3" stroke-width="2"/>`;
  rows.forEach((r,i)=>{const last=i===rows.length-1;if(last||i===0||i%4===0)s+=`<text class="axis" x="${X(i).toFixed(1)}" y="${H-8}" text-anchor="middle">${r.y}</text>`;
    if(last){s+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(r.v).toFixed(1)}" r="3.4" fill="#C8102E"/><text class="vlabel" x="${X(i).toFixed(1)}" y="${(Y(r.v)-9).toFixed(1)}" text-anchor="end">${cz(r.v/1000,1)}</text>`;}});
  el.innerHTML=s+'</svg>';
}
const QLAB={net_profit:'Čistý zisk',operating_result:'Provozní výsledek',operating_income:'Provozní výnosy',net_interest_income:'Čistý úrok. výnos'};
function render(d){
  document.getElementById('per').textContent=`Q${d.period.quarter} ${d.period.year}`;
  document.getElementById('bankname').textContent=d.bank.name;
  document.getElementById('bsub').innerHTML=`Konsolidované neauditované výsledky dle <b>IFRS</b> · ${d.bank.parent_group} · měna <b>CZK</b>`;
  // KPI
  const ord=['net_profit','operating_result','operating_income','net_interest_income','net_fee_commission_income','total_assets','net_customer_loans','customer_deposits','net_interest_margin','cost_income_ratio','roe','npl_ratio'];
  const by={};d.kpis.forEach(k=>by[k.code]=k);
  document.getElementById('kpis').innerHTML=ord.filter(c=>by[c]).map(c=>{const k=by[c];
    return `<div class="kpi"><div class="name">${k.label_cs}</div><div class="val mono">${fmt(k.unit,k.type,k.value)}</div><div class="d">${yoyHtml(k.unit,k.type,k.yoy)} <span class="flat">r/r</span></div></div>`;}).join('');
  // charts
  const seg=document.getElementById('qseg');let cur='net_profit';
  const draw=()=>barChart(document.getElementById('qchart'),d.quarterly[cur],'var(--navy2)');
  seg.innerHTML=Object.keys(d.quarterly).map(c=>`<button data-c="${c}" class="${c===cur?'on':''}">${QLAB[c]||c}</button>`).join('');
  seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{cur=b.dataset.c;seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));draw();});
  draw(); lineChart(document.getElementById('achart'),d.annual);
  document.getElementById('annsub').textContent=`roční čistý zisk ${d.annual[0].y}–${d.annual.at(-1).y} · mld. Kč`;
  // category tables
  document.getElementById('cats').innerHTML=d.categories.map(c=>{
    const rows=c.metrics.map(m=>`<tr class="${m.headline?'hl':''}">
      <td>${m.label}</td>
      <td class="num">${fmt(m.unit,m.type,m.latest)}</td>
      <td class="num">${yoyHtml(m.unit,m.type,m.yoy)}</td>
      <td>${spark(m.spark,m.unit)}</td></tr>`).join('');
    return `<div class="cat"><h3>${c.title} <span>${c.metrics.length} metrik · Q${c.metrics[0].lq} ${c.metrics[0].ly}</span></h3>
      <table><thead><tr><th>Metrika</th><th>Hodnota</th><th>r/r</th><th>vývoj</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }).join('');
  document.getElementById('prov').textContent='Zdroj: ČS IR (reported IFRS) + peer PDF · '+d.categories.reduce((a,c)=>a+c.metrics.length,0)+' metrik z katalogu';
}
async function load(){
  const s=document.getElementById('src');
  for(const u of ['/api/dashboard/cs','./data.json']){try{const r=await fetch(u);if(r.ok){s.innerHTML='<span class="dot"></span>živá data';return render(await r.json());}}catch(e){}}
  s.innerHTML='<span class="dot"></span>vložený snapshot';render(SNAPSHOT);
}
load();
