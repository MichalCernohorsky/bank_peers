name: Ingest (scheduled)

# Watcher navázaný na finanční kalendář (config/calendar.yaml). Idempotentní:
# pokud nepřišel nový dokument (stejný checksum), nic se nepřestaví.
on:
  schedule:
    - cron: "0 6 * * *"        # denně 06:00 UTC
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      # Demo běh je self-contained: zdroj ČS přebijeme na verzovaný vzorek
      # (v produkci se zdroj bere z calendar.yaml: http IR URL + DATABASE_URL secret).
      - name: Run watcher
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m pipeline.watch --once \
            --target "sqlite:///data/cs_financials.db" \
            --source cs=tests/fixtures/key_figures_sample.xlsx
      # exit kód 1 (zamítnuto bránou / chybějící dokument) shodí job -> GitHub pošle alert
